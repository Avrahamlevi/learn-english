<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WordUp - פסיכומטרי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E8504A;
  --red-dark:#c93f39;
  --blue-dark:#1E2D4E;
  --green:#27AE60;
  --gray-bg:#F2F3F7;
  --white:#ffffff;
  --text-main:#1E2D4E;
  --text-muted:#8896AF;
  --border:#E2E8F0;
}
body{
  font-family:'Heebo',sans-serif;
  background:var(--gray-bg);
  color:var(--text-main);
  min-height:100vh;
  direction:rtl;
  max-width:430px;
  margin:0 auto;
  position:relative;
  overflow-x:hidden;
}
.app{display:flex;flex-direction:column;min-height:100vh}
.quiz-header{background:var(--red);padding:0;flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:48px 20px 0;position:relative;}
.close-btn{width:36px;height:36px;border:none;background:none;color:rgba(255,255,255,0.85);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.15s;}
.close-btn:hover{background:rgba(255,255,255,0.15)}
.score-row{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 16px 0;color:white;}
.score-col{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;}
.score-col.center{flex:1;align-items:center}
.score-icon{font-size:22px;opacity:0.9}
.score-num{font-family:'Poppins',sans-serif;font-size:18px;font-weight:700;color:white;line-height:1;}
.score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,0.75);}
.tab-indicator{height:3px;background:rgba(255,255,255,0.25);margin:10px 16px 0;border-radius:2px;position:relative;}
.tab-indicator::after{content:'';position:absolute;left:50%;transform:translateX(-50%);width:80px;height:3px;background:white;border-radius:2px;}
.selector-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 14px;gap:8px;}
.selector-btn{background:rgba(255,255,255,0.18);border:none;color:white;border-radius:8px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background 0.15s;flex:1;justify-content:center;}
.selector-btn:hover{background:rgba(255,255,255,0.28)}
.selector-btn .arrow{font-size:10px;opacity:0.75}
.quiz-body{background:white;flex:1;display:flex;flex-direction:column;align-items:center;padding:32px 24px 40px;min-height:400px;}
.word-card-wrap{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.word-display{width:100%;background:var(--gray-bg);border-radius:20px;padding:28px 24px;text-align:center;cursor:pointer;transition:transform 0.15s;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;}
.word-display:active{transform:scale(0.98)}
.word-en{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;color:var(--text-main);direction:ltr;}
.word-he{font-size:18px;font-weight:700;color:var(--text-main);display:none;line-height:1.4;}
.word-ex{font-size:12px;color:var(--text-muted);direction:ltr;font-style:italic;line-height:1.5;display:none;margin-top:4px;}
.tap-hint{font-size:12px;color:var(--text-muted);margin-top:4px;}
.word-display.revealed .word-he{display:block}
.word-display.revealed .word-ex{display:block}
.word-display.revealed .tap-hint{display:none}
.action-row{display:flex;gap:12px;width:100%;margin-top:20px;}
.action-btn{flex:1;padding:16px;border:none;border-radius:14px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform 0.15s,filter 0.15s;}
.action-btn:active{transform:scale(0.97)}
.btn-unknown{background:#FDECEA;color:#C0392B}
.btn-unknown:hover{filter:brightness(0.95)}
.btn-known{background:#E8F8F0;color:#1a7a44}
.btn-known:hover{filter:brightness(0.95)}
.btn-icon{font-size:20px}
.completion{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px 0;width:100%;}
.confetti-emoji{font-size:52px;animation:bounce 0.5s ease}
@keyframes bounce{0%{transform:scale(0.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.comp-title{font-size:22px;font-weight:800;color:var(--text-main)}
.comp-sub{font-size:15px;color:var(--text-muted);line-height:1.6;max-width:260px}
.comp-btns{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px}
.comp-btn-primary{width:100%;padding:15px;background:var(--red);color:white;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:filter 0.15s;}
.comp-btn-primary:hover{filter:brightness(0.93)}
.comp-btn-secondary{width:100%;padding:15px;background:var(--blue-dark);color:white;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:filter 0.15s;}
.comp-btn-secondary:hover{filter:brightness(0.85)}
.modal-overlay{position:fixed;inset:0;background:rgba(30,45,78,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex}
.modal-sheet{background:white;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:0 0 40px;animation:slideSheet 0.3s ease;max-height:85vh;overflow-y:auto;}
@keyframes slideSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-header{display:flex;align-items:center;justify-content:flex-end;padding:16px 20px 0;}
.sheet-close{width:32px;height:32px;border:none;background:var(--gray-bg);border-radius:50%;font-size:16px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;}
.sheet-title{text-align:center;font-size:18px;font-weight:700;color:var(--text-main);padding:4px 0 20px;}
.sheet-list{list-style:none}
.sheet-item{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:17px;font-weight:500;color:var(--text-main);transition:background 0.1s;border-top:1px solid var(--border);direction:ltr;text-align:right;}
.sheet-item:hover{background:var(--gray-bg)}
.sheet-item-label{display:flex;align-items:center;gap:6px;direction:rtl;}
.sheet-item-he{color:var(--text-main)}
.sheet-item-en{font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;}
.sheet-item.selected .sheet-item-en,.sheet-item.selected .sheet-item-he{color:var(--red)}
.check-icon{color:var(--red);font-size:18px;opacity:0;}
.sheet-item.selected .check-icon{opacity:1}
.word-display.exit-left{animation:exitLeft 0.22s ease forwards}
.word-display.exit-right{animation:exitRight 0.22s ease forwards}
@keyframes exitLeft{to{opacity:0;transform:translateX(-60px)}}
@keyframes exitRight{to{opacity:0;transform:translateX(60px)}}
.word-display.enter{animation:enterCard 0.2s ease}
@keyframes enterCard{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="app">
  <div class="quiz-header">
    <div class="header-top">
      <div style="width:36px"></div>
      <div></div>
      <button class="close-btn" onclick="startUnit()">✕</button>
    </div>
    <div class="score-row">
      <div class="score-col">
        <div class="score-icon">👎</div>
        <div class="score-num" id="unknownNum">0</div>
      </div>
      <div class="score-col center">
        <div class="score-label">למיון</div>
        <div class="score-num" id="remainingNum">0</div>
      </div>
      <div class="score-col">
        <div class="score-icon">👍</div>
        <div class="score-num" id="knownNum">0</div>
      </div>
    </div>
    <div class="tab-indicator"></div>
    <div class="selector-row">
      <button class="selector-btn" onclick="openModal('unit')" id="unitBtn">
        <span id="unitBtnText">יחידה : Unit 1</span>
        <span class="arrow">▾</span>
      </button>
      <button class="selector-btn" onclick="openModal('level')" id="levelBtn">
        <span id="levelBtnText">רמה : קלה</span>
        <span class="arrow">▾</span>
      </button>
    </div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<div class="modal-overlay" id="unitModal" onclick="closeModalOutside(event,'unitModal')">
  <div class="modal-sheet">
    <div class="sheet-header"><button class="sheet-close" onclick="closeModal('unitModal')">✕</button></div>
    <div class="sheet-title">בחירת יחידה למיון</div>
    <ul class="sheet-list" id="unitList"></ul>
  </div>
</div>

<div class="modal-overlay" id="levelModal" onclick="closeModalOutside(event,'levelModal')">
  <div class="modal-sheet">
    <div class="sheet-header"><button class="sheet-close" onclick="closeModal('levelModal')">✕</button></div>
    <div class="sheet-title">בחירת רמה</div>
    <ul class="sheet-list" id="levelList"></ul>
  </div>
</div>

// מילים שלא ידועות ביחידה 1 קלה לפי הנתונים שהתקבלו
const INITIAL_UNKNOWN = new Set([
  "easy_1_decrease","easy_1_deem","easy_1_disastrous","easy_1_entire",
  "easy_1_never","easy_1_object","easy_1_primarily"
]);

const LEVELS={easy:'קלה',medium:'בינונית',hard:'קשה'};
let currentUnit=1, currentLevel='easy';
let queue=[], queueIdx=0, knownCount=0, unknownCount=0;

function wordKey(lvl,unit,en){ return lvl+'_'+unit+'_'+en; }

function init(){
  buildModals();
  startUnit();
}

function buildModals(){
  const ul=document.getElementById('unitList');
  ul.innerHTML='';
  for(let i=1;i<=10;i++){
    const hasWords=(WORDS[currentLevel]&&WORDS[currentLevel][i]&&WORDS[currentLevel][i].length>0);
    const li=document.createElement('li');
    li.className='sheet-item'+(i===currentUnit?' selected':'');
    li.dataset.unit=i;
    const countLabel=hasWords?` (${WORDS[currentLevel][i].length})`:'';
    li.innerHTML=`<div class="sheet-item-label"><span class="sheet-item-he">יחידה : </span><span class="sheet-item-en">Unit ${i}${countLabel}</span></div><span class="check-icon">✓</span>`;
    li.onclick=()=>selectUnit(i);
    ul.appendChild(li);
  }
  const ll=document.getElementById('levelList');
  ll.innerHTML='';
  Object.entries(LEVELS).forEach(([key,label])=>{
    const li=document.createElement('li');
    li.className='sheet-item'+(key===currentLevel?' selected':'');
    li.dataset.level=key;
    li.innerHTML=`<div class="sheet-item-label"><span class="sheet-item-he">רמה : </span><span class="sheet-item-en">${label}</span></div><span class="check-icon">✓</span>`;
    li.onclick=()=>selectLevel(key);
    ll.appendChild(li);
  });
}

function selectUnit(n){
  currentUnit=n;
  document.getElementById('unitBtnText').textContent=`יחידה : Unit ${n}`;
  document.querySelectorAll('#unitList .sheet-item').forEach(el=>{
    el.classList.toggle('selected',parseInt(el.dataset.unit)===n);
  });
  closeModal('unitModal');
  setTimeout(()=>startUnit(),250);
}

function selectLevel(key){
  currentLevel=key;
  document.getElementById('levelBtnText').textContent=`רמה : ${LEVELS[key]}`;
  document.querySelectorAll('#levelList .sheet-item').forEach(el=>{
    el.classList.toggle('selected',el.dataset.level===key);
  });
  closeModal('levelModal');
  setTimeout(()=>{buildModals();startUnit();},250);
}

function startUnit(){
  const words=(WORDS[currentLevel]&&WORDS[currentLevel][currentUnit])||[];
  if(words.length===0){
    document.getElementById('quizBody').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:40px 24px;text-align:center;">
        <div style="font-size:48px">📭</div>
        <div style="font-size:18px;font-weight:700;color:var(--text-main)">יחידה זו עדיין ריקה</div>
        <div style="font-size:14px;color:var(--text-muted)">שלח את המילים ונכניס אותן!</div>
      </div>`;
    document.getElementById('unknownNum').textContent=0;
    document.getElementById('knownNum').textContent=0;
    document.getElementById('remainingNum').textContent=0;
    return;
  }
  queue=shuffle([...words]);
  queueIdx=0;knownCount=0;unknownCount=0;knownWords=[];unknownWords=[];
  updateScores();
  showCard();
}

function updateScores(){
  document.getElementById('unknownNum').textContent=unknownCount;
  document.getElementById('knownNum').textContent=knownCount;
  document.getElementById('remainingNum').textContent=Math.max(0,queue.length-queueIdx);
}

// שמירת רשימות ידועות/לא ידועות
let knownWords=[], unknownWords=[];

function showCard(){
  if(queueIdx>=queue.length){showCompletion();return;}
  const w=queue[queueIdx];
  const body=document.getElementById('quizBody');
  body.innerHTML=`
    <div class="word-card-wrap">
      <div class="word-display enter" id="wordDisplay" onclick="toggleReveal()">
        <div class="word-en">${w.en}</div>
        <div class="word-he">${w.he}</div>
        <div class="tap-hint">הקש לגלות תרגום 👆</div>
        <div class="tap-hint-hide" style="display:none;font-size:12px;color:var(--text-muted);margin-top:4px">הקש להסתיר 👆</div>
      </div>
    </div>
    <div class="action-row">
      <button class="action-btn btn-unknown" onclick="answer(false)">
        <span class="btn-icon">👎</span> לא יודע
      </button>
      <button class="action-btn btn-known" onclick="answer(true)">
        ידעתי! <span class="btn-icon">👍</span>
      </button>
    </div>
  `;
}

function toggleReveal(){
  const d=document.getElementById('wordDisplay');
  if(!d) return;
  const isRevealed=d.classList.contains('revealed');
  if(isRevealed){
    d.classList.remove('revealed');
    d.querySelector('.tap-hint').style.display='';
    d.querySelector('.tap-hint-hide').style.display='none';
  } else {
    d.classList.add('revealed');
    d.querySelector('.tap-hint').style.display='none';
    d.querySelector('.tap-hint-hide').style.display='';
  }
}

function answer(knew){
  const d=document.getElementById('wordDisplay');
  if(d && !d.classList.contains('revealed')) d.classList.add('revealed');
  const w=queue[queueIdx];
  if(knew){ knownCount++; knownWords.push(w); }
  else { unknownCount++; unknownWords.push(w); }
  const card=document.getElementById('wordDisplay');
  if(card){
    card.classList.add(knew?'exit-right':'exit-left');
    setTimeout(()=>{queueIdx++;updateScores();showCard();},200);
  } else {queueIdx++;updateScores();showCard();}
}

function showCompletion(){
  const total=queue.length;
  const pct=total>0?Math.round((knownCount/total)*100):0;
  const emoji=pct>=80?'🎉':pct>=50?'💪':'📚';

  const buildList=(words, isKnown)=>{
    if(words.length===0) return `<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px 0">אין מילים</div>`;
    return words.map(w=>`
      <div style="background:${isKnown?'#E8F8F0':'#FDECEA'};border-radius:10px;padding:10px 12px;margin-bottom:8px">
        <div style="font-family:Poppins,sans-serif;font-weight:700;font-size:14px;direction:ltr;color:var(--text-main)">${w.en}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${w.he}</div>
      </div>`).join('');
  };

  document.getElementById('quizBody').innerHTML=`
    <div style="width:100%;display:flex;flex-direction:column;gap:12px;padding-bottom:16px">

      <div style="text-align:center;padding:12px 0 4px">
        <div style="font-size:32px">${emoji}</div>
        <div style="font-size:18px;font-weight:800;color:var(--text-main);margin-top:4px">כל הכבוד!</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:2px">${knownCount} ידועות · ${unknownCount} ללמוד</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

        <div style="background:white;border-radius:14px;overflow:hidden;border:1.5px solid #b7e8cc">
          <div style="background:#E8F8F0;padding:10px;text-align:center;border-bottom:1.5px solid #b7e8cc">
            <div style="font-size:13px;font-weight:700;color:#1a7a44">🟢 ידועות</div>
            <div style="font-family:Poppins,sans-serif;font-size:20px;font-weight:800;color:#1a7a44">${knownCount}</div>
          </div>
          <div style="padding:10px;max-height:340px;overflow-y:auto">
            ${buildList(knownWords, true)}
          </div>
        </div>

        <div style="background:white;border-radius:14px;overflow:hidden;border:1.5px solid #fcd5d5">
          <div style="background:#FDECEA;padding:10px;text-align:center;border-bottom:1.5px solid #fcd5d5">
            <div style="font-size:13px;font-weight:700;color:#C0392B">🔴 ללמוד</div>
            <div style="font-family:Poppins,sans-serif;font-size:20px;font-weight:800;color:#C0392B">${unknownCount}</div>
          </div>
          <div style="padding:10px;max-height:340px;overflow-y:auto">
            ${buildList(unknownWords, false)}
          </div>
        </div>

      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">
        <button class="comp-btn-primary" onclick="startUnit()">🔄 מיין שוב</button>
        <button class="comp-btn-secondary" onclick="nextUnit()">▶ יחידה הבאה</button>
      </div>
    </div>`;
}

function nextUnit(){
  const next=currentUnit<10?currentUnit+1:1;
  selectUnit(next);
}

function openModal(type){document.getElementById(type+'Modal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeModalOutside(e,id){if(e.target===document.getElementById(id))closeModal(id);}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

init();
</script>
</body>
